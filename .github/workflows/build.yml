name: App build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_debug:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build App (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Input\ Source\ Pro.xcodeproj/ \
            -scheme "Input Source Pro" \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
